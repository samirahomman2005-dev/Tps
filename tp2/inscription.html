<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Samira Homman</title>
    <link rel="stylesheet" href="form.css">
    
</head>
<body>

    <h1>Formulaire d'inscription</h1>

    <form action="#" method="post">

        <fieldset>
            <legend>Informations personnelles</legend>
            
            <label for="nom">Nom :</label>
            <input type="text" id="nom" name="nom" placeholder="Votre nom" required><br>

            <label for="prenom">Prénom :</label>
            <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required><br>

            <label for="email">Email :</label>
            <input type="email" id="email" name="email" placeholder="exemple@mail.com" required><br>

            <label for="tel">Téléphone :</label>
            <input type="tel" id="tel" name="telephone" placeholder="06XXXXXXXX" pattern="^0[0-9]{9}$" required><br>
        </fieldset>

        <fieldset>
            <legend>Autres informations</legend>

            <label for="birth">Date de naissance :</label>
            <input type="date" id="birth" name="date" required><br>

            <label for="pass">Mot de passe :</label>
            <input type="password" id="pass" name="password" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" title="8 caractères minimum, une majuscule et un chiffre" required><br>

            <label>Genre :</label>
            <input type="radio" name="genre" id="h" value="H"> <label for="h">Homme</label>
            <input type="radio" name="genre" id="f" value="F"> <label for="f">Femme</label><br>

            <label for="pays_list">Pays :</label>
            <input list="pays" id="pays_list" name="pays">
            <datalist id="pays">
                <option value="Maroc">
                <option value="France">
                <option value="Espagne">
            </datalist><br>

            <label>Centres d'intérêt :</label><br>
            <input type="checkbox" id="prog" name="interet" value="programmation"> <label for="prog">Programmation</label>
            <input type="checkbox" id="sport" name="interet" value="sport"> <label for="sport">Sport</label><br>

            <label for="bio">Biographie :</label><br>
            <textarea id="bio" name="biographie" maxlength="200" placeholder="Parlez-nous de vous..."></textarea><br>

            <label for="file">Photo de profil :</label>
            <input type="file" id="file" name="photo" accept="image/*" required><br>

            <input type="checkbox" id="cgu" required> 
            <label for="cgu">J'accepte les conditions générales</label>
        </fieldset>

        <button type="submit">S'inscrire</button>

    </form>

</body>
</html>
